services:
  frametv:
    image: ghcr.io/mrtncode/frametv-art-gallery:latest
    container_name: frametv_artgallery
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - frametv_data:/data
    environment:
      - SECRET_KEY=supersecretkey
      - FRAME_TV_DATA=/data

volumes:
  frametv_data:
