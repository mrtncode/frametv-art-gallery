version: '3.9'

services:
  frametv:
    image: ghcr.io/mrtncode/frametv-art-gallery:latest
    container_name: frametv_artgallery
    ports:
      - "8000:8000"
    volumes:
      - frametv_uploads:/app/uploads
      - frametv_db:/app/instance
    environment:
      - SECRET_KEY=supersecretkey

volumes:
  frametv_uploads:
  frametv_db: