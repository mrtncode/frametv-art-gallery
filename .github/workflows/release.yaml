name: Release Please
on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v17.6
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          release-type: node # Anpassen an Ihr Projekt (z.B. python, go, rust, ruby)
